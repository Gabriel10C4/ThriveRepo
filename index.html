<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenido a Thrive</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0 flex flex-col font-sans h-auto">

  <!-- Header -->
  <header class="absolute flex h-[70px] w-full bg-gradient-to-b from-[#0077b6] to-[#00b4d8] shadow-[0px_10px_25px_gray]">
  </header>

  <!-- Contenedor principal -->
  <div class="relative text-center">

    <!-- Caja central -->
    <div
      id="Thrive"
      class="absolute top-1/2 left-1/2 z-10 flex -translate-x-1/2 -translate-y-1/2 flex-col items-center justify-center bg-black/40 px-8 py-8 text-center"
    >
      <img src="assets/images/logo.png" alt="" class="w-[40%]" />

      <p class="w-[400px] text-[20px] text-white">
        <b>Hacemos tus sueños realidad, entrar al mundo de Thrive esta a un solo clic!!</b>
      </p>

      <button
        id="btnC"
        class="m-[10px] h-full w-[200px] cursor-pointer rounded-[20px] border-none bg-[#0077b6] p-5 text-[25px] text-white"
      >
        <b>Comenzar</b>
      </button>
    </div>

    <!-- Galería -->
    <section id="indP" class="mt-[70px] flex h-[630px] w-full overflow-hidden">
      <img
        src="assets/images/floresn.jpeg"
        alt=""
        class="w-0 flex-grow object-cover opacity-90 transition-all duration-500 ease-in-out hover:w-[300px] hover:opacity-100 hover:contrast-125"
      />

      <img
        src="assets/images/llaveros.jpg"
        alt=""
        class="w-0 flex-grow object-cover opacity-90 transition-all duration-500 ease-in-out hover:w-[300px] hover:opacity-100 hover:contrast-125"
      />

      <img
        src="assets/images/giraP.jpeg"
        alt=""
        class="w-0 flex-grow object-cover opacity-90 transition-all duration-500 ease-in-out hover:w-[300px] hover:opacity-100 hover:contrast-125"
      />

      <img
        src="assets/images/Tulips.jpeg"
        alt=""
        class="w-0 flex-grow object-cover opacity-90 transition-all duration-500 ease-in-out hover:w-[300px] hover:opacity-100 hover:contrast-125"
      />

      <img
        src="assets/images/spiderMan.jpeg"
        alt=""
        class="w-0 flex-grow object-cover opacity-90 transition-all duration-500 ease-in-out hover:w-[300px] hover:opacity-100 hover:contrast-125"
      />
    </section>
  </div>

  <!-- Footer -->
  <footer class="flex h-[80px] w-full bg-gradient-to-b from-[#00b4d8] to-[#0077b6]">
  </footer>

  <!-- JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
